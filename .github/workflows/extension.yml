name: Browser Extension CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/browser-extension/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/extension.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/browser-extension/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/extension.yml'

concurrency:
  group: extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@10.9.4
      - run: npm ci
      - run: npm run lint --workspace=packages/shared
      - run: npm run lint --workspace=apps/browser-extension
      - run: npm run test --workspace=apps/browser-extension
      - run: npm run build --workspace=apps/browser-extension
