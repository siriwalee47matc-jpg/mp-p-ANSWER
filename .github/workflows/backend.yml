name: Backend API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend-api/**'
      - 'packages/shared/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend-api/**'
      - 'packages/shared/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/sentinel_ci?schema=public
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@10.9.4
      - run: npm ci
      - run: npm run prisma:validate
      - run: npm run prisma:generate
      - run: npm run lint --workspace=packages/shared
      - run: npm run lint --workspace=apps/backend-api
      - run: npm run test:coverage --workspace=apps/backend-api
      - run: npm run build --workspace=packages/shared
      - run: npm run build --workspace=apps/backend-api
