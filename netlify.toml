[build]
  command   = "npm run build --workspace=apps/dashboard-web"
  publish   = "apps/dashboard-web/.next"

[build.environment]
  NODE_VERSION = "20"
  # Set this in Netlify UI → Site configuration → Environment variables
  # NEXT_PUBLIC_API_URL = "https://your-api-domain.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
